<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title data-i18n="signup-page-title">BioTrack | Crear cuenta gratis</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="icon" type="image/x-icon" href="../images/favicon.ico">
  <link rel="stylesheet" href="../styles/styles-signup.css" />
</head>
<body>

  <div class="auth-bg">
    <div class="auth-blob blob-1"></div>
    <div class="auth-blob blob-2"></div>
  </div>

  <a href="../index.html" class="back-btn" aria-label="Volver al inicio">
    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
      <path d="M19 12H5M12 19l-7-7 7-7"/>
    </svg>
    <span data-i18n="auth-back-home">Volver al inicio</span>
  </a>

  <div class="lang-switcher auth-lang-switcher" role="group" aria-label="Seleccionar idioma">
    <button class="lang-btn active" data-lang="es" onclick="applyLanguage('es')" aria-label="Español">ES</button>
    <span class="lang-divider">|</span>
    <button class="lang-btn" data-lang="en" onclick="applyLanguage('en')" aria-label="English">EN</button>
  </div>

  <main class="auth-wrapper">
    <div class="auth-form-side">
      <div class="auth-card">

        <!-- Logo -->
        <div class="auth-logo">
          <img src="../images/biotrack-1.png" alt="BioTrack" />
        </div>

        <!-- Encabezado -->
        <div class="auth-header">
          <h1><span data-i18n="signup-title-main">Empieza</span> <em data-i18n="signup-title-em">hoy mismo</em></h1>
          <p data-i18n="signup-subtitle">Crea tu cuenta gratuita y empieza a gestionar tu salud con guía profesional real.</p>
        </div>

        <!-- Beneficios rápidos -->
        <div class="auth-perks">
          <div class="perk">
            <svg width="15" height="15" viewBox="0 0 24 24" fill="currentColor"><path d="M9 16.17L4.83 12l-1.42 1.41L9 19 21 7l-1.41-1.41z"/></svg>
            <span data-i18n="signup-perk-1">Plan nutricional personalizado incluido</span>
          </div>
          <div class="perk">
            <svg width="15" height="15" viewBox="0 0 24 24" fill="currentColor"><path d="M9 16.17L4.83 12l-1.42 1.41L9 19 21 7l-1.41-1.41z"/></svg>
            <span data-i18n="signup-perk-2">Nutricionista asignado en minutos</span>
          </div>
          <div class="perk">
            <svg width="15" height="15" viewBox="0 0 24 24" fill="currentColor"><path d="M9 16.17L4.83 12l-1.42 1.41L9 19 21 7l-1.41-1.41z"/></svg>
            <span data-i18n="signup-perk-3">Sin tarjeta de crédito — gratis para empezar</span>
          </div>
        </div>

        <!-- Formulario -->
        <form novalidate>

          <div class="form-row-2">
            <div class="form-group">
              <label for="nombre" data-i18n="signup-firstname-label">Nombre</label>
              <div class="input-wrapper">
                <svg class="input-icon" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20 21v-2a4 4 0 00-4-4H8a4 4 0 00-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
                <input type="text" id="nombre" name="nombre" class="form-input" data-i18n-placeholder="signup-firstname-ph" placeholder="Ingrese nombre" autocomplete="given-name" required />
              </div>
            </div>
            <div class="form-group">
              <label for="apellido" data-i18n="signup-lastname-label">Apellido</label>
              <div class="input-wrapper">
                <svg class="input-icon" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20 21v-2a4 4 0 00-4-4H8a4 4 0 00-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
                <input type="text" id="apellido" name="apellido" class="form-input" data-i18n-placeholder="signup-lastname-ph" placeholder="Ingrese apellido" autocomplete="family-name" required />
              </div>
            </div>
          </div>

          <div class="form-group">
            <label for="email" data-i18n="auth-email-label">Correo electrónico</label>
            <div class="input-wrapper">
              <svg class="input-icon" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"/><polyline points="22,6 12,13 2,6"/></svg>
              <input type="email" id="email" name="email" class="form-input" data-i18n-placeholder="auth-email-ph" placeholder="tu@correo.com" autocomplete="email" required />
            </div>
          </div>

          <div class="form-group">
            <label for="password" data-i18n="auth-password-label">Contraseña</label>
            <div class="input-wrapper">
              <svg class="input-icon" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="11" width="18" height="11" rx="2" ry="2"/><path d="M7 11V7a5 5 0 0110 0v4"/></svg>
              <input type="password" id="password" name="password" class="form-input has-toggle" data-i18n-placeholder="signup-password-ph" placeholder="Mínimo 8 caracteres" autocomplete="new-password" required />
              <button type="button" class="toggle-pwd" aria-label="Mostrar contraseña" data-i18n-aria-label="auth-show-password" data-target="password">
                <svg class="eye-icon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
                <svg class="eye-off-icon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="display:none"><path d="M17.94 17.94A10.07 10.07 0 0112 20c-7 0-11-8-11-8a18.45 18.45 0 015.06-5.94"/><path d="M9.9 4.24A9.12 9.12 0 0112 4c7 0 11 8 11 8a18.5 18.5 0 01-2.16 3.19"/><line x1="1" y1="1" x2="23" y2="23"/></svg>
              </button>
            </div>
            <div class="strength-wrap">
              <div class="strength-bars">
                <div class="strength-bar" id="s1"></div>
                <div class="strength-bar" id="s2"></div>
                <div class="strength-bar" id="s3"></div>
                <div class="strength-bar" id="s4"></div>
              </div>
              <span class="strength-hint" id="strength-hint"></span>
            </div>
          </div>

          <div class="form-group">
            <label for="password2" data-i18n="signup-password2-label">Confirmar contraseña</label>
            <div class="input-wrapper">
              <svg class="input-icon" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="11" width="18" height="11" rx="2" ry="2"/><path d="M7 11V7a5 5 0 0110 0v4"/></svg>
              <input type="password" id="password2" name="password2" class="form-input has-toggle" data-i18n-placeholder="signup-password2-ph" placeholder="Repite tu contraseña" autocomplete="new-password" required />
              <button type="button" class="toggle-pwd" aria-label="Mostrar contraseña" data-i18n-aria-label="auth-show-password" data-target="password2">
                <svg class="eye-icon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
                <svg class="eye-off-icon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="display:none"><path d="M17.94 17.94A10.07 10.07 0 0112 20c-7 0-11-8-11-8a18.45 18.45 0 015.06-5.94"/><path d="M9.9 4.24A9.12 9.12 0 0112 4c7 0 11 8 11 8a18.5 18.5 0 01-2.16 3.19"/><line x1="1" y1="1" x2="23" y2="23"/></svg>
              </button>
            </div>
          </div>

          <label class="terms-label">
            <input type="checkbox" name="terms" required />
            <span>
              <span data-i18n="signup-terms-prefix">Acepto los</span>
              <a href="#" data-i18n="signup-terms-link1">Términos de uso</a>
              <span data-i18n="signup-terms-mid">y la</span>
              <a href="#" data-i18n="signup-terms-link2">Política de privacidad</a>
              <span data-i18n="signup-terms-suffix">de BioTrack.</span>
            </span>
          </label>

          <button type="submit" class="btn-submit">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
              <path d="M16 21v-2a4 4 0 00-4-4H5a4 4 0 00-4 4v2"/><circle cx="8.5" cy="7" r="4"/>
              <line x1="20" y1="8" x2="20" y2="14"/><line x1="23" y1="11" x2="17" y2="11"/>
            </svg>
            <span data-i18n="signup-submit">Crear cuenta gratis</span>
          </button>

        </form>

        <div class="divider" data-i18n="signup-divider">o regístrate con</div>

        <button type="button" class="btn-google">
          <svg width="18" height="18" viewBox="0 0 24 24" aria-hidden="true">
            <path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"/>
            <path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/>
            <path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l3.66-2.84z" fill="#FBBC05"/>
            <path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/>
          </svg>
          <span data-i18n="auth-google">Continuar con Google</span>
        </button>

        <p class="auth-footer">
          <span data-i18n="signup-have-account">¿Ya tienes cuenta?</span> <a href="login.html" data-i18n="signup-have-account-link">Inicia sesión</a>
        </p>

      </div>
    </div>
  </main>

  <script src="../i18n.js"></script>
  <script>
    // Indicador fortaleza de contraseña
    const pwdInput = document.getElementById('password');
    const bars  = ['s1','s2','s3','s4'].map(id => document.getElementById(id));
    const hint  = document.getElementById('strength-hint');
    const levels = [
      { color: '#DC3545', key: 'signup-strength-1', es: 'Muy débil', en: 'Very weak' },
      { color: '#f97316', key: 'signup-strength-2', es: 'Débil', en: 'Weak' },
      { color: '#FBBF24', key: 'signup-strength-3', es: 'Aceptable', en: 'Fair' },
      { color: '#10B981', key: 'signup-strength-4', es: 'Fuerte', en: 'Strong' },
    ];

    const getLang = () => document.documentElement.lang === 'en' ? 'en' : 'es';

    function tAuth(key, esFallback, enFallback) {
      const lang = getLang();
      if (typeof translations !== 'undefined' && translations[lang] && translations[lang][key] !== undefined) {
        return translations[lang][key];
      }
      return lang === 'en' ? enFallback : esFallback;
    }

    function syncPwdAriaLabels() {
      document.querySelectorAll('.toggle-pwd').forEach(btn => {
        const input = document.getElementById(btn.dataset.target);
        const isHidden = input.type === 'password';
        btn.setAttribute('aria-label', isHidden
          ? tAuth('auth-show-password', 'Mostrar contraseña', 'Show password')
          : tAuth('auth-hide-password', 'Ocultar contraseña', 'Hide password'));
      });
    }

    function getStrengthLabel(level) {
      return tAuth(level.key, level.es, level.en);
    }

    function renderStrengthHint() {
      const v = pwdInput.value;
      let score = 0;
      if (v.length >= 8)           score++;
      if (/[A-Z]/.test(v))         score++;
      if (/[0-9]/.test(v))         score++;
      if (/[^A-Za-z0-9]/.test(v))  score++;

      bars.forEach((bar, i) => {
        bar.style.background = i < score ? levels[score - 1].color : 'var(--gray-border)';
      });

      hint.textContent = v.length === 0 ? '' : getStrengthLabel(levels[score - 1]);
      hint.style.color = score > 0 ? levels[score - 1].color : 'var(--gray-mid)';
    }

    // Toggle visibilidad contraseña
    document.querySelectorAll('.toggle-pwd').forEach(btn => {
      btn.addEventListener('click', () => {
        const input = document.getElementById(btn.dataset.target);
        const isHidden = input.type === 'password';
        input.type = isHidden ? 'text' : 'password';
        btn.querySelector('.eye-icon').style.display     = isHidden ? 'none'  : '';
        btn.querySelector('.eye-off-icon').style.display = isHidden ? ''      : 'none';
        syncPwdAriaLabels();
      });
    });

    pwdInput.addEventListener('input', renderStrengthHint);
    document.addEventListener('biotrack:lang-changed', () => {
      syncPwdAriaLabels();
      renderStrengthHint();
    });

    syncPwdAriaLabels();
    renderStrengthHint();
  </script>

</body>
</html>
